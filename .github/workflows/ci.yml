name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  repository:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --max-retries 2 "**/*.md"
          fail: true
