name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --max-retries 2 "**/*.md"
          fail: true
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet restore Commerce.sln --locked-mode
      - run: dotnet build Commerce.sln --configuration Release --no-restore
      - run: dotnet test Commerce.sln --configuration Release --no-build
